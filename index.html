<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate AI - Campus Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-header h1 { font-size: 1.5rem; }
        .chat-header p { opacity: 0.9; font-size: 0.8rem; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .message.user { flex-direction: row-reverse; }
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message.user .message-content {
            background: #667eea;
            color: white;
        }
        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }
        .chat-input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .chat-input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .typing-indicator {
            padding: 10px 15px;
            background: #e9ecef;
            border-radius: 18px;
            display: inline-block;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>🤖 StudyMate AI</h1>
        <p>Your intelligent campus study assistant</p>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            <div class="message-avatar">🤖</div>
            <div class="message-content">Hello! I'm StudyMate AI. How can I help you with your studies today?</div>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Type your question here..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // ===== CONFIGURATION - PASTE YOUR AZURE INFO HERE =====
    // LƯU Ý: KHÔNG commit API key lên GitHub công khai!
    // Hiện tại để trống, sau khi deploy xong, bạn có thể:
    // 1. Dùng local model (Ollama) hoặc
    // 2. Thêm API key sau qua Azure Environment Variables
    const AZURE_ENDPOINT = "";  // Thay bằng endpoint của bạn
    const API_KEY = "";          // Thay bằng key của bạn (NHƯNG ĐỪNG COMMIT LÊN GITHUB)
    const DEPLOYMENT_NAME = "gpt-35-turbo";
    // ======================================================

    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(message, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
        messageDiv.innerHTML = `
            <div class="message-avatar">${isUser ? '👤' : '🤖'}</div>
            <div class="message-content">${message}</div>
        `;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="message-avatar">🤖</div>
            <div class="typing-indicator">StudyMate is thinking...</div>
        `;
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    async function callModel(prompt) {
        // Nếu chưa cấu hình Azure, dùng chế độ demo
        if (!AZURE_ENDPOINT || !API_KEY) {
            return "⚠️ Azure OpenAI is not configured yet. Please set up your endpoint and API key, or switch to Local mode with Ollama.\n\nThis is a demo response. Your chatbot is deployed successfully! 🎉";
        }

        const url = `${AZURE_ENDPOINT}openai/deployments/${DEPLOYMENT_NAME}/chat/completions?api-version=2024-02-15-preview`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'api-key': API_KEY
                },
                body: JSON.stringify({
                    messages: [{ role: 'user', content: prompt }],
                    max_tokens: 500,
                    temperature: 0.7
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || `HTTP ${response.status}`);
            }

            const data = await response.json();
            return data.choices[0].message.content;
        } catch (error) {
            console.error('Error:', error);
            return `Sorry, I encountered an error: ${error.message}. Please check your Azure OpenAI configuration.`;
        }
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        addMessage(message, true);
        userInput.value = '';
        sendBtn.disabled = true;
        showTyping();

        try {
            const response = await callModel(message);
            hideTyping();
            addMessage(response);
        } catch (error) {
            hideTyping();
            addMessage(`Error: ${error.message}`);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }
</script>
</body>
</html>
